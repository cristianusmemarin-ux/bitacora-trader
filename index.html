<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GFX Journale</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6fa;--surface:#ffffff;--card:#ffffff;--border:#e2e8f0;--border2:#cbd5e1;--green:#00b87a;--green-dim:rgba(0,184,122,0.10);--red:#e63050;--red-dim:rgba(230,48,80,0.10);--blue:#2d7dd2;--amber:#e08c00;--purple:#7c3aed;--text:#1a2233;--dim:#94a3b8;--mid:#64748b;--font:'DM Mono',monospace;--display:'Syne',sans-serif;--nav-bg:#ffffff;--logo-color:#1a2233;}
body.dark{--bg:#07080d;--surface:#0c0e16;--card:#10131e;--border:#181f30;--border2:#1f2a40;--green:#00e5a0;--green-dim:rgba(0,229,160,0.12);--red:#ff4060;--red-dim:rgba(255,64,96,0.12);--blue:#4d9fff;--amber:#ffb340;--purple:#a78bfa;--text:#c0cce0;--dim:#3a4a60;--mid:#6a7d98;--nav-bg:#0c0e16;--logo-color:#ffffff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,select,textarea{font-family:var(--font);background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:9px 11px;font-size:13px;width:100%;outline:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--green);}
button{cursor:pointer;font-family:var(--font);}
label{font-size:10px;color:var(--mid);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:5px;}
/* NAV DESKTOP */
nav{background:var(--nav-bg);border-bottom:1px solid var(--border);box-shadow:0 1px 12px rgba(0,0,0,.06);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;}
.logo{font-family:var(--display);font-weight:800;font-size:20px;color:var(--logo-color);letter-spacing:-.03em;padding:14px 0;margin-right:28px;}
.logo span{color:var(--green);}
.tab{background:none;border:none;color:var(--mid);padding:16px;font-size:12px;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--text);border-bottom-color:var(--green);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.btn-demo{background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:6px 14px;border-radius:6px;font-size:10px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);}
.sync-dot.online{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
.btn-theme{background:none;border:1px solid var(--border2);color:var(--mid);padding:6px 10px;border-radius:6px;font-size:14px;line-height:1;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
/* BOTTOM NAV MOBILE */
#bottomNav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--nav-bg);border-top:1px solid var(--border);box-shadow:0 -2px 16px rgba(0,0,0,.08);padding:4px 0 max(4px,env(safe-area-inset-bottom));}
#bottomNav .bnav-items{display:flex;justify-content:space-around;align-items:center;}
.bnav-btn{background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 8px;color:var(--mid);font-size:9px;letter-spacing:.04em;min-width:52px;transition:color .15s;}
.bnav-btn.active{color:var(--green);}
.bnav-icon{font-size:20px;line-height:1;}
/* MOBILE TOP BAR */
#mobileTopBar{display:none;background:var(--nav-bg);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:10px 16px;align-items:center;justify-content:space-between;}
.mobile-logo{font-family:var(--display);font-weight:800;font-size:18px;color:var(--logo-color);letter-spacing:-.03em;}
.mobile-logo span{color:var(--green);}
.mobile-actions{display:flex;align-items:center;gap:8px;}
/* HAMBURGER MENU */
#mobileMenu{position:fixed;inset:0;z-index:200;display:none;}
#mobileMenuOverlay{position:absolute;inset:0;background:rgba(0,0,0,.4);}
#mobileMenuPanel{position:absolute;top:0;right:0;bottom:0;width:260px;background:var(--card);box-shadow:-4px 0 24px rgba(0,0,0,.15);display:flex;flex-direction:column;padding:24px 0;}
.menu-header{padding:0 20px 16px;border-bottom:1px solid var(--border);margin-bottom:8px;}
.menu-user{font-size:11px;color:var(--mid);margin-bottom:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.menu-item{display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:13px;color:var(--text);border:none;background:none;width:100%;text-align:left;transition:background .15s;}
.menu-item:hover{background:var(--bg);}
.menu-item-icon{font-size:16px;width:24px;text-align:center;}
.menu-sep{height:1px;background:var(--border);margin:8px 0;}
@media(max-width:700px){
  nav{display:none;}
  #mobileTopBar{display:flex;}
  #bottomNav{display:block;}
  main{padding:16px 12px 80px;}
}
#authScreen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.auth-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:36px 32px;width:100%;max-width:380px;box-shadow:0 8px 40px rgba(0,0,0,.12);}
.auth-logo{font-family:var(--display);font-weight:800;font-size:26px;color:var(--logo-color);text-align:center;margin-bottom:6px;}
.auth-logo span{color:var(--green);}
.auth-sub{text-align:center;font-size:11px;color:var(--mid);margin-bottom:28px;}
.auth-tabs{display:flex;margin-bottom:24px;background:var(--bg);border-radius:8px;padding:3px;}
.auth-tab{flex:1;background:none;border:none;color:var(--mid);padding:8px;font-size:11px;border-radius:6px;transition:all .2s;}
.auth-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}
.auth-field{margin-bottom:14px;}
.btn-auth{width:100%;background:var(--green);border:none;color:#000;font-weight:700;padding:12px;border-radius:8px;font-size:12px;letter-spacing:.08em;margin-top:6px;font-family:var(--font);}
.btn-auth:disabled{opacity:.5;}
.auth-error{background:var(--red-dim);border:1px solid var(--red);color:var(--red);padding:8px 12px;border-radius:6px;font-size:11px;margin-bottom:12px;display:none;}
.btn-logout{background:none;border:1px solid var(--border2);color:var(--mid);padding:6px 12px;border-radius:6px;font-size:10px;}
.btn-logout:hover{border-color:var(--red);color:var(--red);}
.user-label{font-size:10px;color:var(--mid);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
/* MOBILE NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);border-top:1px solid var(--border);z-index:100;padding:0 0 env(safe-area-inset-bottom,0);}
.bottom-nav-inner{display:flex;align-items:stretch;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 8px;background:none;border:none;color:var(--dim);font-size:9px;letter-spacing:.04em;transition:color .15s;border-top:2px solid transparent;}
.bnav-btn.active{color:var(--green);border-top-color:var(--green);}
.bnav-icon{font-size:18px;line-height:1;}
.top-bar{display:none;background:var(--nav-bg);border-bottom:1px solid var(--border);padding:10px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.top-bar-logo{font-family:var(--display);font-weight:800;font-size:18px;color:var(--logo-color);letter-spacing:-.03em;}
.top-bar-logo span{color:var(--green);}
.top-bar-right{display:flex;align-items:center;gap:8px;}
@media(max-width:1024px){
  nav{display:none !important;}
  .top-bar{display:flex !important;}
  .bottom-nav{display:block !important;}
  main{padding:16px 14px 80px;}
}
main{max-width:1340px;margin:0 auto;padding:24px 20px;}
.kpi-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px;}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:500px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 18px;box-shadow:0 1px 6px rgba(0,0,0,.05);transition:box-shadow .2s;}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
.kpi-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.kpi-label{font-size:11px;color:var(--mid);margin-bottom:6px;}
.kpi-value{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:28px;font-weight:700;line-height:1;letter-spacing:-.02em;}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:6px;}
.grid-2{display:grid;grid-template-columns:1fr 320px;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.grid-2b{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:900px){.grid-2,.grid-3,.grid-2b{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.card-title{font-size:15px;font-weight:600;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.card-subtitle{font-size:11px;color:var(--mid);margin-top:2px;}
.badge{font-size:10px;padding:4px 10px;border-radius:20px;background:var(--bg);color:var(--mid);border:1px solid var(--border);}
.card-body{padding:18px;}
.tbl-wrap{overflow-x:auto;max-height:320px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;}
th{padding:9px 12px;text-align:left;font-size:9px;color:var(--dim);letter-spacing:.1em;border-bottom:1px solid var(--border);font-weight:400;position:sticky;top:0;background:var(--card);}
td{padding:8px 12px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.long{background:var(--green-dim);color:var(--green);padding:2px 7px;border-radius:4px;font-size:9px;font-weight:500;}
.short{background:var(--red-dim);color:var(--red);padding:2px 7px;border-radius:4px;font-size:9px;font-weight:500;}
.win{color:var(--green);font-weight:600;}.loss{color:var(--red);font-weight:600;}
.form-wrap{max-width:740px;margin:0 auto;}
.form-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:600px){.form-grid-4{grid-template-columns:repeat(2,1fr);}.form-grid-2{grid-template-columns:1fr;}}
.pnl-preview{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px;}
@media(max-width:600px){.pnl-preview{grid-template-columns:repeat(3,1fr);}}
.pnl-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.pnl-box-label{font-size:9px;color:var(--dim);margin-bottom:4px;}
.pnl-box-val{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:17px;font-weight:700;}
.dir-btn{flex:1;padding:9px 4px;border-radius:6px;font-size:11px;transition:all .15s;}
.star-btn{width:34px;height:34px;border-radius:6px;font-size:14px;transition:all .15s;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:6px;}
.btn-cancel{background:none;border:1px solid var(--border2);color:var(--mid);padding:10px 20px;border-radius:8px;font-size:11px;}
.btn-save{background:var(--green);border:none;color:#000;font-weight:700;padding:10px 24px;border-radius:8px;font-size:11px;}
.sec-label{font-size:10px;color:var(--mid);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.cal-day{aspect-ratio:1;border-radius:6px;transition:transform .1s;min-height:38px;}
.cal-day:hover{transform:scale(1.1);z-index:10;position:relative;}
.stat-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.hour-stat{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.hour-stat:last-child{border-bottom:none;}
.hour-badge{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;font-size:13px;font-weight:700;flex-shrink:0;}
.crt-inst-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.crt-inst-btn{background:none;border:1px solid var(--border2);color:var(--mid);padding:5px 12px;border-radius:20px;font-size:11px;transition:all .15s;}
.crt-inst-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.crt-tf-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
@media(max-width:600px){.crt-tf-grid{grid-template-columns:repeat(4,1fr);}}
.crt-tf-btn{border-radius:10px;padding:8px 4px;text-align:center;border:1px solid var(--border);background:var(--bg);transition:all .15s;cursor:pointer;}
.empty{text-align:center;padding:50px 20px;color:var(--mid);}
.empty-icon{font-size:40px;opacity:.25;margin-bottom:14px;}
.empty-title{font-family:var(--display);font-size:17px;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:11px;line-height:1.8;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:8px;font-weight:500;font-size:12px;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,184,122,.35);}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
/* IMAGE & LIGHTBOX */
.img-upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-bottom:14px;}
.img-upload-zone:hover{border-color:var(--green);background:var(--green-dim);}
.img-upload-zone.has-image{border-style:solid;border-color:var(--green);padding:0;}
.img-upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;display:block;}
.img-thumb{width:36px;height:36px;object-fit:cover;border-radius:4px;cursor:pointer;border:1px solid var(--border2);transition:transform .2s;}
.img-thumb:hover{transform:scale(1.1);}
.img-remove-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:24px;height:24px;font-size:12px;display:flex;align-items:center;justify-content:center;z-index:2;cursor:pointer;}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
#lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 80px rgba(0,0,0,.6);}
#lightbox-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.7;}
#lightbox-caption{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:11px;}
.upload-progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;display:none;}
.upload-progress-bar{height:100%;background:var(--green);border-radius:2px;width:0%;transition:width .3s;}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span style="font-size:11px;color:var(--mid);letter-spacing:.08em">Conectando...</span></div>
<div id="toast"></div>
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">&#x2715;</button>
  <img id="lightbox-img" src="" alt="">
  <div id="lightbox-caption"></div>
</div>
<!-- DESKTOP NAV -->
<!-- DESKTOP NAV -->
<nav>
  <div class="logo">GFX <span>JOURNALE</span></div>
  <button class="tab active" onclick="showView('dashboard')">Dashboard</button>
  <button class="tab" onclick="showView('log')">Trades</button>
  <button class="tab" onclick="showView('new')">+ Nuevo</button>
  <button class="tab" onclick="showView('crt')">CRT</button>
  <button class="tab" onclick="showView('crtsetups')">CRT Setups</button>
  <div class="nav-right">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncLabel" style="font-size:10px;color:var(--dim)">&#x2014;</span>
    <button class="btn-theme" id="themeBtn" onclick="toggleTheme()">&#x1F319;</button>
    <button class="btn-demo" onclick="loadDemo()">DEMO</button>
    <button class="btn-demo" style="background:var(--red-dim);border-color:var(--red);color:var(--red)" onclick="deleteDemo()">BORRAR DEMO</button>
  </div>
</nav>
<!-- MOBILE TOP BAR -->
<div class="top-bar">
  <div class="top-bar-logo">GFX <span>JOURNALE</span></div>
  <div class="top-bar-right">
    <div class="sync-dot" id="syncDotM"></div>
    <button class="btn-theme" id="themeBtnM" onclick="toggleTheme()">&#x1F319;</button>
    <button id="userBtnM" style="background:none;border:1px solid var(--border2);color:var(--mid);padding:5px 10px;border-radius:6px;font-size:10px;display:none" onclick="showMobileMenu()">&#x2699;&#xFE0F;</button>
  </div>
</div>
<!-- MOBILE BOTTOM NAV -->
<div class="bottom-nav">
  <div class="bottom-nav-inner">
    <button class="bnav-btn active" id="bnav-dashboard" onclick="showView('dashboard')">
      <span class="bnav-icon">&#x1F4CA;</span>Dashboard
    </button>
    <button class="bnav-btn" id="bnav-log" onclick="showView('log')">
      <span class="bnav-icon">&#x1F4CB;</span>Trades
    </button>
    <button class="bnav-btn" id="bnav-new" onclick="showView('new')" style="color:var(--green)">
      <span class="bnav-icon" style="background:var(--green);color:#000;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:20px;margin-bottom:2px">+</span>Nuevo
    </button>
    <button class="bnav-btn" id="bnav-crt" onclick="showView('crt')">
      <span class="bnav-icon">&#x1F3AF;</span>CRT
    </button>
    <button class="bnav-btn" id="bnav-crtsetups" onclick="showView('crtsetups')">
      <span class="bnav-icon">&#x1F4C8;</span>Setups
    </button>
  </div>
</div>
<!-- MOBILE MENU MODAL -->
<div id="mobileMenu" style="display:none;position:fixed;inset:0;z-index:300">
  <!-- backdrop -->
  <div id="menuBackdrop" style="position:absolute;inset:0;background:rgba(0,0,0,.5)" ontouchend="hideMobileMenu()" onclick="hideMobileMenu()"></div>
  <!-- sheet -->
  <div style="position:absolute;bottom:0;left:0;right:0;background:var(--card);border-radius:16px 16px 0 0;padding:20px;border-top:1px solid var(--border)">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
      <div style="width:36px;height:4px;background:var(--border2);border-radius:2px"></div>
      <button ontouchend="hideMobileMenu()" onclick="hideMobileMenu()" style="background:var(--bg);border:1px solid var(--border2);color:var(--mid);font-size:16px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center">&#x2715;</button>
    </div>
    <div id="mobileUserInfo" style="margin-bottom:16px;padding:12px;background:var(--bg);border-radius:10px;font-size:12px;color:var(--mid)"></div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px">
      <button ontouchend="loadDemo();hideMobileMenu()" onclick="loadDemo();hideMobileMenu()" style="background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:12px;border-radius:10px;font-size:12px;font-family:var(--font)">&#x1F3AE; Cargar Demo</button>
      <button ontouchend="deleteDemo();hideMobileMenu()" onclick="deleteDemo();hideMobileMenu()" style="background:var(--red-dim);border:1px solid var(--red);color:var(--red);padding:12px;border-radius:10px;font-size:12px;font-family:var(--font)">&#x1F5D1; Borrar Demo</button>
    </div>
    <button ontouchend="logout()" onclick="logout()" style="width:100%;background:none;border:1px solid var(--border2);color:var(--mid);padding:12px;border-radius:10px;font-size:12px;font-family:var(--font)">Cerrar sesi&#xF3;n</button>
  </div>
</div>
<main id="mainContent"></main>
<div id="authScreen">

function calcStreak(){const s=[...trades].sort((a,b)=>new Date(b.date)-new Date(a.date));if(!s.length)return 0;const f=s[0].pnlNet>0;let n=0;for(const t of s){if((t.pnlNet>0)===f)n+=f?1:-1;else break;}return n;}
function getTradeYears(){const yrs=[...new Set(trades.map(t=>new Date(t.date).getFullYear()))].sort((a,b)=>b-a);return yrs.length?yrs:[new Date().getFullYear()];}

function renderCalSelector(){
  const years=getTradeYears();const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const selY=filterYearCal||years[0];const selM=filterMonthCal!=null?filterMonthCal:new Date().getMonth();
  if(!filterYearCal)filterYearCal=selY;if(filterMonthCal===null)filterMonthCal=selM;
  const yearBtns=years.map(y=>'<button onclick="setFilterCalYear('+y+')" style="padding:4px 10px;border-radius:6px;font-size:10px;font-family:var(--font);border:1px solid '+(y===selY?'var(--blue)':'var(--border2)')+';background:'+(y===selY?'rgba(45,125,210,.1)':'none')+';color:'+(y===selY?'var(--blue)':'var(--mid)')+';">'+y+'</button>').join('');

  return yearBtns+monthBtns;

function setFilterYear(y){filterYearMonths=y;render();}function setFilterCalYear(y){filterYearCal=y;render();}function setFilterCalMonth(v){filterMonthCal=parseInt(v);render();}
function renderCalendar(){
  const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const DIAS_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const years=getTradeYears();const selY=filterYearCal||years[0];
  const selM=filterMonthCal!=null?filterMonthCal:new Date().getMonth();
  // Build day lookup
  const byDay={};
  trades.forEach(t=>{
    const d=new Date(t.date);if(d.getFullYear()!==selY||d.getMonth()!==selM)return;
    const key=d.getDate();
    if(!byDay[key])byDay[key]={pnl:0,count:0,wins:0};
    byDay[key].pnl+=t.pnlNet;byDay[key].count++;if(t.pnlNet>0)byDay[key].wins++;
  });
  const maxAbs=Math.max(...Object.values(byDay).map(d=>Math.abs(d.pnl)),1);
  // First day of month (0=Sun)
  const firstDow=new Date(selY,selM,1).getDay();
  const daysInMonth=new Date(selY,selM+1,0).getDate();
  // Month total
  const monthPnl=Object.values(byDay).reduce((s,d)=>s+d.pnl,0);
  const monthCount=Object.values(byDay).reduce((s,d)=>s+d.count,0);
  const monthWins=Object.values(byDay).reduce((s,d)=>s+d.wins,0);
  const monthCol=monthPnl>=0?'var(--green)':'var(--red)';
  let cells='';
  // Empty cells before first day
  for(let i=0;i<firstDow;i++)cells+='<div></div>';
  // All days of month
  for(let day=1;day<=daysInMonth;day++){
    const d=byDay[day];
    const dow=new Date(selY,selM,day).getDay();
    const isWeekend=dow===0||dow===6;
    if(d){
      const intensity=Math.min(Math.abs(d.pnl)/maxAbs,1);
      const bg=d.pnl>0?'rgba(0,184,122,'+(0.12+intensity*0.55)+')':d.pnl<0?'rgba(230,48,80,'+(0.12+intensity*0.55)+')':'var(--border)';
      const tc=d.pnl>0?'var(--green)':'var(--red)';
      const ps=(d.pnl>=0?'+':'-')+'$'+Math.abs(d.pnl).toFixed(0);
      cells+='<div style="background:'+bg+';border-radius:8px;padding:6px 4px;min-height:56px;display:flex;flex-direction:column;gap:2px;cursor:default" title="'+DIAS_FULL[selM]+' '+day+': '+ps+' ('+d.count+' trades)'+'"><span style="font-size:10px;color:var(--mid);font-weight:600">'+day+'</span><span style="font-size:9px;color:var(--dim)">'+d.count+(d.count===1?' trade':' trades')+'</span><span style="font-size:11px;font-weight:700;color:'+tc+';margin-top:auto">'+ps+'</span></div>';
    } else {

    }
  }
  const monthSummary=monthCount>0?'<div style="display:flex;gap:16px;align-items:center;margin-bottom:10px;padding:10px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border)"><div style="font-family:-apple-system,sans-serif;font-size:22px;font-weight:700;color:'+monthCol+';">'+(monthPnl>=0?'+':'')+monthPnl.toFixed(0)+'</div><div style="flex:1"><div style="font-size:11px;color:var(--mid)">'+monthCount+' trades &middot; '+monthWins+'W / '+(monthCount-monthWins)+'L &middot; '+(monthCount?((monthWins/monthCount)*100).toFixed(0):0)+'% WR</div><div style="font-size:10px;color:var(--dim);margin-top:2px">'+DIAS_FULL[selM]+' '+selY+'</div></div></div>':'<div style="margin-bottom:10px;padding:10px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border);font-size:11px;color:var(--dim)">Sin trades en '+DIAS_FULL[selM]+' '+selY+'</div>';
  return monthSummary+'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">'+['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(l=>'<div style="text-align:center;font-size:9px;color:var(--dim);padding:3px 0;font-weight:600">'+l+'</div>').join('')+'</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">'+cells+'</div>';
}
function renderMonths(){
  const MESES=['\u0045\u006E\u0065','\u0046\u0065\u0062','\u004D\u0061\u0072','\u0041\u0062\u0072','\u004D\u0061\u0079','\u004A\u0075\u006E','\u004A\u0075\u006C','\u0041\u0067\u006F','\u0053\u0065\u0070','\u004F\u0063\u0074','\u004E\u006F\u0076','\u0044\u0069\u0063'];const byMonth={};
  trades.forEach(t=>{const d=new Date(t.date),key=d.getFullYear()+'-'+d.getMonth();if(!byMonth[key])byMonth[key]={pnl:0,count:0,wins:0,month:d.getMonth(),year:d.getFullYear()};byMonth[key].pnl+=t.pnlNet;byMonth[key].count++;if(t.pnlNet>0)byMonth[key].wins++;});
  const list=Object.values(byMonth).sort((a,b)=>a.year-b.year||a.month-b.month).slice(-6);if(!list.length)return'<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">Sin datos</div>';
  const mx=Math.max(...list.map(m=>Math.abs(m.pnl)),1);
  return list.map(m=>{const col=m.pnl>=0?'var(--green)':'var(--red)';const w=Math.abs(m.pnl)/mx*100;const ps=(m.pnl>=0?'+$':'-$')+Math.abs(m.pnl).toFixed(0);return'<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;color:var(--text)">'+MESES[m.month]+' '+m.year+'</span><div style="display:flex;gap:8px"><span style="font-size:9px;color:var(--mid)">'+m.count+' trades</span><span style="font-size:10px;font-weight:600;color:'+col+'">'+ps+'</span></div></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:'+w+'%;background:'+col+'"></div></div></div>';}).join('');
}
function renderMonthsGrid(){
  const MESES=['\u0045\u006E\u0065','\u0046\u0065\u0062','\u004D\u0061\u0072','\u0041\u0062\u0072','\u004D\u0061\u0079','\u004A\u0075\u006E','\u004A\u0075\u006C','\u0041\u0067\u006F','\u0053\u0065\u0070','\u004F\u0063\u0074','\u004E\u006F\u0076','\u0044\u0069\u0063'];
  const years=getTradeYears();const year=filterYearMonths||years[0];const byMonth={};
  trades.forEach(t=>{const d=new Date(t.date);if(d.getFullYear()!==year)return;const m=d.getMonth();if(!byMonth[m])byMonth[m]={pnl:0,count:0,wins:0};byMonth[m].pnl+=t.pnlNet;byMonth[m].count++;if(t.pnlNet>0)byMonth[m].wins++;});
  const maxAbs=Math.max(...Object.values(byMonth).map(m=>Math.abs(m.pnl)),1);
  return'<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">'+MESES.map((name,i)=>{const m=byMonth[i];const pnl=m?m.pnl:null;const bg=pnl===null?'var(--bg)':pnl>0?'rgba(0,184,122,'+(0.1+Math.abs(pnl)/maxAbs*0.5)+')':'rgba(230,48,80,'+(0.1+Math.abs(pnl)/maxAbs*0.5)+')';const intensity=pnl!==null?Math.abs(pnl)/maxAbs:0;const textCol=intensity>.5?'#fff':pnl===null?'var(--dim)':pnl>=0?'var(--green)':'var(--red)';const subTextCol=intensity>.5?'rgba(255,255,255,.8)':'var(--dim)';const ps=pnl===null?'\u2014':(pnl>=0?'+$':'-$')+Math.abs(pnl).toFixed(0);const wr=m&&m.count?(m.wins/m.count*100).toFixed(0)+'% WR':'';return'<div style="background:'+bg+';border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center"><div style="font-size:10px;color:'+subTextCol+';margin-bottom:6px">'+name+'</div><div style="font-size:15px;font-weight:700;color:'+textCol+';line-height:1">'+ps+'</div><div style="font-size:9px;color:'+subTextCol+';margin-top:4px">'+(m?m.count+' trades':'')+'</div><div style="font-size:9px;color:'+textCol+';margin-top:2px;letter-spacing:.04em">'+wr+'</div></div>';}).join('')+'</div>';
}
function renderBestWorstHours(){
  const byHour={};trades.forEach(t=>{const h=new Date(t.date).getHours();if(!byHour[h])byHour[h]={wins:0,losses:0,pnl:0,count:0};byHour[h].pnl+=t.pnlNet;byHour[h].count++;if(t.pnlNet>0)byHour[h].wins++;else byHour[h].losses++;});
  const entries=Object.entries(byHour).filter(([,v])=>v.count>=2);if(!entries.length)return'<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">Necesitas m\xE1s trades</div>';
  const sorted=entries.sort((a,b)=>(b[1].wins/b[1].count)-(a[1].wins/a[1].count));const best=sorted.slice(0,3),worst=sorted.slice(-3).reverse();
  const row=(h,d,type)=>{const wr=(d.wins/d.count*100).toFixed(0);const col=type==='best'?'var(--green)':'var(--red)';const bg=type==='best'?'rgba(0,184,122,.1)':'rgba(230,48,80,.1)';return'<div class="hour-stat"><div class="hour-badge" style="background:'+bg+';color:'+col+'">'+h+'h</div><div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text)">'+h+':00 \u2014 '+(parseInt(h)+1)+':00</div><div style="font-size:10px;color:var(--mid);margin-top:2px">'+d.count+' trades \u00B7 '+wr+'% WR \u00B7 '+fmt(d.pnl)+'</div></div><div style="font-size:14px;font-weight:700;color:'+col+'">'+wr+'%</div></div>';};
  return'<div style="margin-bottom:14px"><div style="font-size:10px;color:var(--green);font-weight:600;letter-spacing:.06em;margin-bottom:8px">\u2713 MEJOR HORARIO</div>'+best.map(([h,d])=>row(h,d,'best')).join('')+'</div><div><div style="font-size:10px;color:var(--red);font-weight:600;letter-spacing:.06em;margin-bottom:8px">\u2717 PEOR HORARIO</div>'+worst.map(([h,d])=>row(h,d,'worst')).join('')+'</div>';
}
function renderSetups(){
  const bs={};trades.forEach(t=>{const s=t.setup||'\u2014';if(!bs[s])bs[s]={pnl:0,count:0,wins:0};bs[s].pnl+=t.pnlNet;bs[s].count++;if(t.pnlNet>0)bs[s].wins++;});
  const list=Object.entries(bs).filter(([k])=>k!=='\u2014').sort((a,b)=>b[1].pnl-a[1].pnl).slice(0,6);if(!list.length)return'<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">Agrega setups a tus trades</div>';
  const mx=Math.max(...list.map(([,v])=>Math.abs(v.pnl)),1);
  return list.map(([name,d])=>{const wr=d.count?d.wins/d.count*100:0,w=Math.abs(d.pnl)/mx*100,col=d.pnl>=0?'var(--green)':'var(--red)';return'<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;color:var(--text)">'+name+'</span><div style="display:flex;gap:8px"><span style="font-size:9px;color:var(--mid)">'+wr.toFixed(0)+'%WR</span><span style="font-size:10px;font-weight:500;color:'+col+'">'+fmt(d.pnl)+'</span></div></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:'+w+'%;background:'+col+'"></div></div></div>';}).join('');
}
function renderCRTStats(){
  const stats={};trades.forEach(t=>{const m=(t.note||'').match(/\[CRT:([^\]]+)\]/);if(!m)return;m[1].split(',').forEach(r=>{if(!stats[r])stats[r]={tp:0,sl:0};if(t.pnlNet>0)stats[r].tp++;else stats[r].sl++;});});
  const list=Object.entries(stats).sort((a,b)=>(b[1].tp/(b[1].tp+b[1].sl||1))-(a[1].tp/(a[1].tp+a[1].sl||1))).slice(0,6);if(!list.length)return'<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">Marca rangos CRT al ingresar trades para ver estad\xEDsticas</div>';
  return list.map(([name,d])=>{const total=d.tp+d.sl,wr=total?d.tp/total*100:0,col=wr>=50?'var(--green)':'var(--red)';return'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:11px;font-weight:600;color:var(--text)">'+name+'</div><div style="font-size:10px;color:var(--mid);margin-top:2px">'+d.tp+'TP \u00B7 '+d.sl+'SL \u00B7 '+total+' trades</div></div><div style="font-size:16px;font-weight:700;color:'+col+'">'+wr.toFixed(0)+'%</div></div>';}).join('');
}

async function submitForm(){

  const inst=document.getElementById('f-inst').value;const qty=+document.getElementById('f-qty')?.value||1;const comm=+document.getElementById('f-comm')?.value||0;
  const fx=isFx(inst),r=calcResult(inst,entry,exit,qty,currentDir);const totalComm=fx?comm:qty*2*comm;

  const crtRanges=Object.entries(formCRTStates).filter(([,s])=>s).map(([tf,s])=>tf+':'+s).join(',');

    let savedTrade;

}

function drawEquity(){const cv=document.getElementById('eqCanvas');if(!cv)return;const dpr=window.devicePixelRatio||1,W=cv.offsetWidth,H=180;cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);const sorted=[...trades].sort((a,b)=>new Date(a.date)-new Date(b.date));let cum=0;const pts=[0,...sorted.map(t=>{cum+=t.pnlNet;return cum;})];const pad={t:8,r:8,b:22,l:50},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;const minV=Math.min(0,...pts),maxV=Math.max(0,...pts),range=maxV-minV||1;const tx=i=>pad.l+(i/(pts.length-1))*cW,ty=v=>pad.t+cH-((v-minV)/range)*cH;ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;for(let i=0;i<=4;i++){const y=pad.t+(cH/4)*i;ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(W-pad.r,y);ctx.stroke();ctx.fillStyle='#94a3b8';ctx.font='9px DM Mono,monospace';ctx.textAlign='right';ctx.fillText((maxV-(range/4)*i>=0?'+':'')+(maxV-(range/4)*i).toFixed(0),pad.l-4,y+3);}ctx.strokeStyle='rgba(0,0,0,.06)';ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(pad.l,ty(0));ctx.lineTo(W-pad.r,ty(0));ctx.stroke();ctx.setLineDash([]);const last=pts[pts.length-1],lc=last>=0?'#00b87a':'#e63050';const grad=ctx.createLinearGradient(0,pad.t,0,H-pad.b);grad.addColorStop(0,last>=0?'rgba(0,184,122,.2)':'rgba(230,48,80,.2)');grad.addColorStop(1,'rgba(0,0,0,0)');ctx.beginPath();ctx.moveTo(tx(0),ty(0));pts.forEach((v,i)=>ctx.lineTo(tx(i),ty(v)));ctx.lineTo(tx(pts.length-1),ty(0));ctx.closePath();ctx.fillStyle=grad;ctx.fill();ctx.beginPath();pts.forEach((v,i)=>i===0?ctx.moveTo(tx(i),ty(v)):ctx.lineTo(tx(i),ty(v)));ctx.strokeStyle=lc;ctx.lineWidth=1.8;ctx.stroke();ctx.beginPath();ctx.arc(tx(pts.length-1),ty(last),4,0,Math.PI*2);ctx.fillStyle=lc;ctx.fill();}
function drawMAE(){const cv=document.getElementById('maeCanvas');if(!cv)return;const dpr=window.devicePixelRatio||1,W=cv.offsetWidth,H=160;cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);const pad={t:8,r:8,b:16,l:26},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;const maxMFE=Math.max(...trades.map(t=>t.mfe||0),1),maxMAE=Math.max(...trades.map(t=>t.mae||0),1);for(let i=0;i<=3;i++){ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,pad.t+cH/3*i);ctx.lineTo(W-pad.r,pad.t+cH/3*i);ctx.stroke();}trades.forEach(t=>{const x=pad.l+((t.mfe||0)/maxMFE)*cW,y=pad.t+cH-((t.mae||0)/maxMAE)*cH;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=t.pnlNet>0?'rgba(0,184,122,.6)':'rgba(230,48,80,.55)';ctx.fill();});ctx.fillStyle='#94a3b8';ctx.font='8px DM Mono,monospace';ctx.textAlign='center';ctx.fillText('MFE \u2192',pad.l+cW/2,H-2);ctx.save();ctx.translate(9,pad.t+cH/2);ctx.rotate(-Math.PI/2);ctx.fillText('MAE \u2192',0,0);ctx.restore();}

function genDemo(n){const result=[],insts=['MES','MNQ','MES','EURUSD'];let date=new Date('2025-10-01T09:30:00');for(let i=0;i<n;i++){while([0,6].includes(date.getDay()))date=new Date(date.getTime()+86400000);const inst=insts[Math.floor(Math.random()*insts.length)],fx=isFx(inst);const qty=fx?+(Math.random()>.5?.10:.05).toFixed(2):Math.random()>.65?2:1;let gross,comm;if(fx){const pips=Math.random()>.43?Math.floor(Math.random()*30+5):-Math.floor(Math.random()*20+3);gross=pips*10*qty;comm=7;}else{const spec=FUTURES_SPECS[inst]||{tick:.25,tv:1.25};const ticks=Math.random()>.43?Math.floor(Math.random()*28+4):-Math.floor(Math.random()*18+3);gross=ticks*spec.tv*qty;comm=qty*2*.62;}result.push({date:date.toISOString(),instrument:inst,direction:Math.random()>.45?'Long':'Short',qty,entryPrice:+(5200+Math.random()*50).toFixed(2),exitPrice:+(5200+Math.random()*50).toFixed(2),pnlGross:+gross.toFixed(2),pnlNet:+(gross-comm).toFixed(2),commission:+comm.toFixed(2),durationMin:Math.floor(Math.random()*30+1),mae:Math.floor(Math.random()*14),mfe:Math.floor(Math.random()*35+4),setup:SETUPS[Math.floor(Math.random()*SETUPS.length)],emotion:EMOTIONS[Math.floor(Math.random()*EMOTIONS.length)],note:'',rating:Math.floor(Math.random()*5)+1,source:'demo',imagePath:null});date=new Date(date.getTime()+Math.random()*5400000+900000);if(date.getHours()>=16){date=new Date(date.getTime()+18*3600000);date.setHours(9,30,0,0);}}return result;}

// CRT SETUPS ANALYSIS
let crtSetupsMinTrades=5;
function setCRTMinTrades(v){crtSetupsMinTrades=parseInt(v);render();}
function renderCRTSetups(){
  if(!trades.length)return'<div class="empty"><div class="empty-icon">&#x1F4CA;</div><div class="empty-title">Sin trades</div><div class="empty-sub">Agrega trades con CRT y setup para ver el an\xE1lisis</div></div>';
  const combos=[];trades.forEach(t=>{const m=(t.note||'').match(/\[CRT:([^\]]+)\]/);if(!m)return;const crts=m[1].split(',').map(r=>r.trim()).filter(Boolean);if(!crts.length)return;combos.push({crts,setup:t.setup||'\u2014',pnlNet:t.pnlNet,pnlGross:t.pnlGross||0,win:t.pnlNet>0});});
  if(!combos.length)return'<div class="empty"><div class="empty-icon">&#x1F50D;</div><div class="empty-title">Sin datos CRT</div><div class="empty-sub">Marca rangos CRT al ingresar tus trades para ver el an\xE1lisis</div></div>';
  const conditionMap={};function getSubsets(arr){const result=[];for(let mask=1;mask<(1<<arr.length);mask++){const sub=arr.filter((_,i)=>mask&(1<<i));result.push(sub);}return result;}
  combos.forEach(({crts,setup,pnlNet,pnlGross,win})=>{const subsets=getSubsets(crts);subsets.forEach(subset=>{const setupLabel=setup&&setup!=='\u2014'?setup:'Sin setup';const keyWithSetup=subset.sort().join(' + ')+' | '+setupLabel;if(!conditionMap[keyWithSetup])conditionMap[keyWithSetup]={label:subset.sort().join(' + '),setup:setupLabel,trades:[],wins:0,pnl:0,grossW:0,grossL:0};conditionMap[keyWithSetup].trades.push(pnlNet);if(win){conditionMap[keyWithSetup].wins++;conditionMap[keyWithSetup].grossW+=pnlGross;}else conditionMap[keyWithSetup].grossL+=Math.abs(pnlGross);conditionMap[keyWithSetup].pnl+=pnlNet;});});
  const results=Object.values(conditionMap).filter(c=>c.trades.length>=crtSetupsMinTrades).map(c=>{const n=c.trades.length,wr=c.wins/n*100;const avgW=c.wins?c.grossW/c.wins:0;const losses=n-c.wins;const avgL=losses?c.grossL/losses:0;const exp=(wr/100*avgW)-((1-wr/100)*avgL);const pf=c.grossL>0?c.grossW/c.grossL:null;return{...c,n,wr,avgW,avgL,exp,pf};}).sort((a,b)=>b.exp-a.exp);
  const minOpts=[3,5,10,15,20];
  return'<div class="card" style="margin-bottom:16px"><div class="card-head"><div><div class="card-title">An\xE1lisis autom\xE1tico de confluencias</div><div class="card-subtitle">Todas las combinaciones CRT + Setup ordenadas por expectativa</div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;color:var(--mid)">M\xEDn. trades:</span>'+minOpts.map(n=>'<button onclick="setCRTMinTrades('+n+')" style="padding:4px 10px;border-radius:6px;font-size:10px;font-family:var(--font);border:1px solid '+(crtSetupsMinTrades===n?'var(--green)':'var(--border2)')+';background:'+(crtSetupsMinTrades===n?'var(--green-dim)':'none')+';color:'+(crtSetupsMinTrades===n?'var(--green)':'var(--mid)')+';">'+n+'</button>').join('')+'</div></div><div class="tbl-wrap">'+(results.length===0?'<div style="padding:40px;text-align:center;color:var(--mid);font-size:11px">No hay combinaciones con '+crtSetupsMinTrades+'+ trades. Baja el m\xEDnimo o agrega m\xE1s trades.</div>':'<table><thead><tr><th>CONFLUENCIA CRT</th><th>SETUP</th><th>TRADES</th><th>WIN RATE</th><th>EXPECTATIVA</th><th>AVG WIN</th><th>AVG LOSS</th><th>PROFIT FACTOR</th></tr></thead><tbody>'+results.map((r,i)=>{const medal=i===0?'\uD83E\uDD47':i===1?'\uD83E\uDD48':i===2?'\uD83E\uDD49':'';const wrCol=r.wr>=60?'var(--green)':r.wr>=50?'var(--amber)':'var(--red)';const expCol=r.exp>=0?'var(--green)':'var(--red)';const pfCol=r.pf&&r.pf>=1.5?'var(--green)':r.pf&&r.pf>=1?'var(--amber)':'var(--red)';return'<tr><td style="font-weight:600;color:var(--text)">'+medal+' '+r.label+'</td><td style="color:var(--mid);font-size:10px">'+r.setup+'</td><td style="color:var(--dim)">'+r.n+'</td><td style="color:'+wrCol+';font-weight:600">'+r.wr.toFixed(1)+'%</td><td style="color:'+expCol+';font-weight:700">'+fmt(r.exp)+'</td><td style="color:var(--green)">'+fmt(r.avgW)+'</td><td style="color:var(--red)">-$'+r.avgL.toFixed(0)+'</td><td style="color:'+pfCol+'">'+(r.pf!==null?r.pf.toFixed(2):'\u2014')+'</td></tr>';}).join('')+'</tbody></table>')+'</div></div>';
}

function fmt(v){return(v>=0?'+':'')+('$'+Math.abs(v).toFixed(0));}
function toggleTheme(){
  const d=document.body.classList.toggle('dark');localStorage.setItem('tradelog-theme',d?'dark':'light');
  const icon=d?'\u2600\uFE0F':'\uD83C\uDF19';
  ['themeBtn','themeBtnM','menuThemeToggle'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=icon;});
  setTimeout(()=>drawCharts(),50);
}
function initTheme(){
  const saved=localStorage.getItem('tradelog-theme'),dark=window.matchMedia('(prefers-color-scheme: dark)').matches;
  if(saved==='dark'||(!saved&&dark)){document.body.classList.add('dark');['themeBtn','themeBtnM','menuThemeToggle'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='\u2600\uFE0F';});}
}
initTheme();window.addEventListener('resize',()=>drawCharts());init();
</script>
</script>
