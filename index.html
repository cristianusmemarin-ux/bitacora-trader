<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="description" content="bitácora trader — Tu diario de trading en español">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>bitácora trader</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 44 44'%3E%3Cpolygon points='22,1 43,22 22,43 1,22' fill='%230a0f1e'/%3E%3Cpolygon points='22,1 43,22 22,43' fill='%2300b87a'/%3E%3Cpolyline points='7,31 14,22 23,26 33,11' fill='none' stroke='%23ffffff' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3Ccircle cx='33' cy='11' r='3' fill='%23ffffff'/%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#f4f6fa;--surface:#ffffff;--card:#ffffff;--border:#e2e8f0;--border2:#cbd5e1;--green:#00b87a;--green-dim:rgba(0,184,122,0.10);--red:#e63050;--red-dim:rgba(230,48,80,0.10);--blue:#2d7dd2;--amber:#e08c00;--purple:#7c3aed;--text:#1a2233;--dim:#94a3b8;--mid:#64748b;--font:'DM Mono',monospace;--display:'Syne',sans-serif;--nav-bg:#ffffff;--logo-color:#1a2233;}
body.dark{--bg:#07080d;--surface:#0c0e16;--card:#10131e;--border:#181f30;--border2:#1f2a40;--green:#00e5a0;--green-dim:rgba(0,229,160,0.12);--red:#ff4060;--red-dim:rgba(255,64,96,0.12);--blue:#4d9fff;--amber:#ffb340;--purple:#a78bfa;--text:#c0cce0;--dim:#3a4a60;--mid:#6a7d98;--nav-bg:#0c0e16;--logo-color:#ffffff;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
input,select,textarea{font-family:var(--font);background:var(--surface);border:1px solid var(--border2);color:var(--text);border-radius:6px;padding:9px 11px;font-size:13px;width:100%;outline:none;-webkit-appearance:none;}
input:focus,select:focus,textarea:focus{border-color:var(--green);}
button{cursor:pointer;font-family:var(--font);}
label{font-size:10px;color:var(--mid);letter-spacing:.08em;text-transform:uppercase;display:block;margin-bottom:5px;}

/* MODE SWITCHER - Live / Backtesting */
.mode-bar{background:var(--nav-bg);border-bottom:2px solid var(--border);display:flex;align-items:center;justify-content:center;gap:0;padding:0;position:sticky;top:56px;z-index:99;}
@media(max-width:1024px){.mode-bar{top:52px;}}
.mode-tab{background:none;border:none;color:var(--mid);padding:10px 28px;font-size:12px;font-weight:600;letter-spacing:.08em;border-bottom:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:7px;}
.mode-tab.active-live{color:var(--green);border-bottom-color:var(--green);}
.mode-tab.active-bt{color:var(--amber);border-bottom-color:var(--amber);}
.mode-dot{width:7px;height:7px;border-radius:50%;}
.mode-dot-live{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
.mode-dot-bt{background:var(--amber);}
.mode-sep{width:1px;height:28px;background:var(--border);margin:0 4px;}
/* Live badge on cards */
.live-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.06em;}
.live-badge.live{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
.live-badge.bt{background:rgba(224,140,0,.12);color:var(--amber);border:1px solid var(--amber);}

/* NAV DESKTOP */
nav{background:var(--nav-bg);border-bottom:1px solid var(--border);box-shadow:0 1px 12px rgba(0,0,0,.06);display:flex;align-items:center;padding:0 24px;position:sticky;top:0;z-index:100;height:56px;}
.logo{font-family:var(--display);font-weight:800;font-size:20px;color:var(--logo-color);letter-spacing:-.03em;padding:14px 0;margin-right:28px;}
.logo span{color:var(--green);}
.tab{background:none;border:none;color:var(--mid);padding:16px;font-size:12px;border-bottom:2px solid transparent;transition:all .2s;}
.tab.active{color:var(--text);border-bottom-color:var(--green);}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.btn-demo{background:var(--green-dim);border:1px solid var(--green);color:var(--green);padding:6px 14px;border-radius:6px;font-size:10px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--dim);}
.sync-dot.online{background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 2s infinite;}
.btn-theme{background:none;border:1px solid var(--border2);color:var(--mid);padding:6px 10px;border-radius:6px;font-size:14px;line-height:1;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* MOBILE TOP BAR */
.top-bar{display:none;background:var(--nav-bg);border-bottom:1px solid var(--border);padding:10px 16px;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;height:52px;}
.top-bar-logo{font-family:var(--display);font-weight:800;font-size:18px;color:var(--logo-color);letter-spacing:-.03em;}
.top-bar-logo span{color:var(--green);}
.top-bar-right{display:flex;align-items:center;gap:8px;}

/* BOTTOM NAV */
.bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--nav-bg);border-top:1px solid var(--border);z-index:100;padding:0 0 env(safe-area-inset-bottom,0);}
.bottom-nav-inner{display:flex;align-items:stretch;}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:10px 4px 8px;background:none;border:none;color:var(--dim);font-size:9px;letter-spacing:.04em;transition:color .15s;border-top:2px solid transparent;}
.bnav-btn.active{color:var(--green);border-top-color:var(--green);}
.bnav-icon{font-size:18px;line-height:1;}

@media(max-width:1024px){
  nav{display:none !important;}
  .top-bar{display:flex !important;}
  .bottom-nav{display:block !important;}
  main{padding:16px 14px 90px;}
  .mode-bar{top:52px;}
}
main{max-width:1340px;margin:0 auto;padding:24px 20px;}

/* CARDS & GRIDS */
.kpi-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:14px;margin-bottom:20px;}
@media(max-width:900px){.kpi-grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:500px){.kpi-grid{grid-template-columns:repeat(2,1fr);}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 18px;box-shadow:0 1px 6px rgba(0,0,0,.05);transition:box-shadow .2s;}
.kpi:hover{box-shadow:0 4px 16px rgba(0,0,0,.08);}
.kpi-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;}
.kpi-label{font-size:11px;color:var(--mid);margin-bottom:6px;}
.kpi-value{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:28px;font-weight:700;line-height:1;letter-spacing:-.02em;}
.kpi-sub{font-size:11px;color:var(--dim);margin-top:6px;}
.grid-2{display:grid;grid-template-columns:1fr 320px;gap:14px;margin-bottom:14px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:14px;}
.grid-2b{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px;}
@media(max-width:900px){.grid-2,.grid-3,.grid-2b{grid-template-columns:1fr;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.05);}
.card-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.card-title{font-size:15px;font-weight:600;color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
.card-subtitle{font-size:11px;color:var(--mid);margin-top:2px;}
.badge{font-size:10px;padding:4px 10px;border-radius:20px;background:var(--bg);color:var(--mid);border:1px solid var(--border);}
.card-body{padding:18px;}
.tbl-wrap{overflow-x:auto;max-height:320px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;font-size:11px;white-space:nowrap;}
th{padding:9px 12px;text-align:left;font-size:9px;color:var(--dim);letter-spacing:.1em;border-bottom:1px solid var(--border);font-weight:400;position:sticky;top:0;background:var(--card);}
td{padding:8px 12px;border-bottom:1px solid var(--border);}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg);}
.long{background:var(--green-dim);color:var(--green);padding:2px 7px;border-radius:4px;font-size:9px;font-weight:500;}
.short{background:var(--red-dim);color:var(--red);padding:2px 7px;border-radius:4px;font-size:9px;font-weight:500;}
.win{color:var(--green);font-weight:600;}.loss{color:var(--red);font-weight:600;}
.form-wrap{max-width:740px;margin:0 auto;}
.form-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px;}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;}
@media(max-width:600px){.form-grid-4{grid-template-columns:repeat(2,1fr);}.form-grid-2{grid-template-columns:1fr;}}
.pnl-preview{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:10px;}
@media(max-width:600px){.pnl-preview{grid-template-columns:repeat(3,1fr);}}
.pnl-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;}
.pnl-box-label{font-size:9px;color:var(--dim);margin-bottom:4px;}
.pnl-box-val{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:17px;font-weight:700;}
.dir-btn{flex:1;padding:9px 4px;border-radius:6px;font-size:11px;transition:all .15s;}
.star-btn{width:34px;height:34px;border-radius:6px;font-size:14px;transition:all .15s;}
.form-actions{display:flex;gap:10px;justify-content:flex-end;padding-top:6px;}
@media(max-width:1024px){.form-actions{position:sticky;bottom:70px;background:var(--card);padding:12px 0 4px;z-index:10;border-top:1px solid var(--border);}}
.btn-cancel{background:none;border:1px solid var(--border2);color:var(--mid);padding:10px 20px;border-radius:8px;font-size:11px;}
.btn-save{background:var(--green);border:none;color:#000;font-weight:700;padding:10px 24px;border-radius:8px;font-size:11px;}
.btn-save-bt{background:var(--amber);border:none;color:#000;font-weight:700;padding:10px 24px;border-radius:8px;font-size:11px;}
.sec-label{font-size:10px;color:var(--mid);letter-spacing:.08em;text-transform:uppercase;margin:16px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.stat-bar-bg{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:3px;}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .6s ease;}
.hour-stat{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border);}
.hour-stat:last-child{border-bottom:none;}
.hour-badge{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:-apple-system,sans-serif;font-size:13px;font-weight:700;flex-shrink:0;}
.crt-inst-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;}
.crt-inst-btn{background:none;border:1px solid var(--border2);color:var(--mid);padding:5px 12px;border-radius:20px;font-size:11px;transition:all .15s;}
.crt-inst-btn.active{background:var(--blue);border-color:var(--blue);color:#fff;}
.crt-tf-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
@media(max-width:600px){.crt-tf-grid{grid-template-columns:repeat(4,1fr);}}
.crt-tf-btn{border-radius:10px;padding:8px 4px;text-align:center;border:1px solid var(--border);background:var(--bg);transition:all .15s;cursor:pointer;}
.empty{text-align:center;padding:50px 20px;color:var(--mid);}
.empty-icon{font-size:40px;opacity:.25;margin-bottom:14px;}
.empty-title{font-family:var(--display);font-size:17px;color:var(--text);margin-bottom:8px;}
.empty-sub{font-size:11px;line-height:1.8;}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:10px 20px;border-radius:8px;font-weight:500;font-size:12px;z-index:999;display:none;box-shadow:0 4px 20px rgba(0,184,122,.35);}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:999;flex-direction:column;gap:12px;}
.spinner{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.img-upload-zone{border:2px dashed var(--border2);border-radius:10px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;margin-bottom:14px;}
.img-upload-zone:hover{border-color:var(--green);background:var(--green-dim);}
.img-upload-zone.has-image{border-style:solid;border-color:var(--green);padding:0;}
.img-upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.img-preview{width:100%;max-height:200px;object-fit:cover;border-radius:8px;display:block;}
.img-thumb{width:36px;height:36px;object-fit:cover;border-radius:4px;cursor:pointer;border:1px solid var(--border2);transition:transform .2s;}
.img-thumb:hover{transform:scale(1.1);}
.img-remove-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,.6);border:none;color:#fff;border-radius:50%;width:24px;height:24px;font-size:12px;display:flex;align-items:center;justify-content:center;z-index:2;cursor:pointer;}
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:500;display:none;align-items:center;justify-content:center;cursor:zoom-out;}
#lightbox img{max-width:92vw;max-height:88vh;object-fit:contain;border-radius:8px;box-shadow:0 20px 80px rgba(0,0,0,.6);}
#lightbox-close{position:absolute;top:20px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;opacity:.7;}
#lightbox-caption{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.6);font-size:11px;}
.upload-progress{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-top:8px;display:none;}
.upload-progress-bar{height:100%;background:var(--green);border-radius:2px;width:0%;transition:width .3s;}
/* BT mode accent */
body.bt-mode .mode-bar{border-bottom-color:rgba(224,140,0,.3);}
body.bt-mode .tab.active{border-bottom-color:var(--amber);color:var(--amber);}
body.bt-mode .bnav-btn.active{color:var(--amber);border-top-color:var(--amber);}
body.bt-mode input:focus,body.bt-mode select:focus,body.bt-mode textarea:focus{border-color:var(--amber);}

/* ── DUAL IMAGE / KEY LEVEL ─────── */
.img-dual-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px;}
.btn-save-bt{background:var(--amber);border:none;color:#000;font-weight:700;padding:10px 24px;border-radius:8px;font-size:11px;}
@media(max-width:600px){.img-dual-grid{grid-template-columns:1fr;}}

/* ── TRADE DETAIL MODAL ─────────── */
#tradeModal{position:fixed;inset:0;z-index:400;display:none;align-items:center;justify-content:center;padding:16px;}
#tradeModalOverlay{position:absolute;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);}
#tradeModalPanel{position:relative;z-index:1;background:var(--card);border:1px solid var(--border);border-radius:20px;width:100%;max-width:900px;max-height:92vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.25);}
.tm-header{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--card);z-index:2;border-radius:20px 20px 0 0;flex-wrap:wrap;}
.tm-inst{font-family:var(--display);font-size:22px;font-weight:800;letter-spacing:-.02em;}
.tm-dir{padding:3px 10px;border-radius:6px;font-size:11px;font-weight:700;letter-spacing:.06em;}
.tm-dir.long{background:var(--green-dim);color:var(--green);border:1px solid var(--green);}
.tm-dir.short{background:var(--red-dim);color:var(--red);border:1px solid var(--red);}
.tm-date{font-size:11px;color:var(--mid);}
.tm-actions{margin-left:auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap;}
.tm-nav-btn{background:none;border:1px solid var(--border2);color:var(--mid);width:30px;height:30px;border-radius:8px;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .15s;cursor:pointer;}
.tm-nav-btn:hover:not(:disabled){border-color:var(--green);color:var(--green);}
.tm-nav-btn:disabled{opacity:.25;cursor:default;}
.tm-close{background:none;border:1px solid var(--border2);color:var(--mid);width:30px;height:30px;border-radius:8px;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.tm-close:hover{border-color:var(--red);color:var(--red);}
.tm-body{display:grid;grid-template-columns:1fr 310px;}
@media(max-width:680px){.tm-body{grid-template-columns:1fr;}}
.tm-left{padding:18px;border-right:1px solid var(--border);}
@media(max-width:680px){.tm-left{border-right:none;border-bottom:1px solid var(--border);}}
.tm-right{padding:18px;}
.tm-imgs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}
.tm-imgs.single{grid-template-columns:1fr;}
.tm-img-wrap{position:relative;border-radius:10px;overflow:hidden;border:1px solid var(--border);background:var(--bg);cursor:zoom-in;}
.tm-img-wrap img{width:100%;display:block;max-height:200px;object-fit:cover;transition:transform .2s;}
.tm-img-wrap:hover img{transform:scale(1.02);}
.tm-img-label{position:absolute;top:6px;left:8px;font-size:9px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:4px;}
.tm-img-label.start{background:rgba(0,184,122,.85);color:#fff;}
.tm-img-label.end{background:rgba(230,48,80,.85);color:#fff;}
.tm-no-img{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80px;color:var(--dim);font-size:11px;gap:6px;background:var(--bg);border-radius:10px;border:1px dashed var(--border);margin-bottom:14px;}
.tm-pnl-hero{text-align:center;padding:14px;background:var(--bg);border-radius:10px;border:1px solid var(--border);margin-bottom:12px;}
.tm-pnl-val{font-family:-apple-system,sans-serif;font-size:32px;font-weight:800;line-height:1;letter-spacing:-.03em;}
.tm-pnl-sub{font-size:10px;color:var(--mid);margin-top:4px;}
.tm-stars{display:flex;gap:3px;justify-content:center;margin-top:8px;}
.tm-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px;}
.tm-stat{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px 10px;}
.tm-stat-label{font-size:9px;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin-bottom:3px;}
.tm-stat-val{font-family:-apple-system,sans-serif;font-size:14px;font-weight:700;color:var(--text);}
.tm-section{margin-bottom:12px;}
.tm-stitle{font-size:9px;color:var(--dim);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--border);}
.tm-note{font-size:12px;color:var(--text);line-height:1.7;background:var(--bg);border-radius:8px;padding:10px;border:1px solid var(--border);min-height:44px;white-space:pre-wrap;}
.tm-ctx-row{display:flex;justify-content:space-between;align-items:center;font-size:11px;padding:6px 0;border-bottom:1px solid var(--border);}
.tm-ctx-row:last-child{border-bottom:none;}
.tm-progress{height:5px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:3px;}
.tm-progress-fill{height:100%;border-radius:3px;}
</style>
</head>
<body>
<div id="loading"><div class="spinner"></div><span style="font-size:11px;color:var(--mid);letter-spacing:.08em">Conectando...</span></div>

  const kpis=[{l:'P&L Neto',v:fmt(total),c:total>=0?'var(--green)':'var(--red)',s:trs.length+' trades',svg:svgs[0],ic:total>=0?'#00b87a':'#e63050',ibg:total>=0?'rgba(0,184,122,.1)':'rgba(230,48,80,.1)'},{l:'Win Rate',v:wr.toFixed(1)+'%',c:wr>=50?'var(--green)':'var(--red)',s:wins.length+'W / '+losses.length+'L',svg:svgs[1],ic:'#2d7dd2',ibg:'rgba(45,125,210,.1)'},{l:'Profit Factor',v:pf>50?'∞':pf.toFixed(2),c:'var(--amber)',s:pf>=1.5?'Excelente':pf>=1?'Positivo':'Negativo',svg:svgs[2],ic:'#e08c00',ibg:'rgba(224,140,0,.1)'},{l:'Avg Win',v:fmt(avgW),c:'var(--green)',s:'Mejor: '+fmt(Math.max(0,...wins.map(t=>t.pnlNet))),svg:svgs[3],ic:'#00b87a',ibg:'rgba(0,184,122,.1)'},{l:'Avg Loss',v:fmt(avgL),c:'var(--red)',s:'Peor: '+fmt(Math.min(0,...losses.map(t=>t.pnlNet))),svg:svgs[4],ic:'#e63050',ibg:'rgba(230,48,80,.1)'},{l:'Racha Actual',v:streak>0?'+'+streak+'W':streak+'L',c:streak>0?'var(--green)':streak<0?'var(--red)':'var(--mid)',s:'consecutivos',svg:svgs[5],ic:'#7c3aed',ibg:'rgba(124,58,237,.1)'},{l:'Risk/Reward',v:rr!==null?rr.toFixed(2):'—',c:rr===null?'var(--mid)':rr>=1.5?'var(--green)':rr>=1?'var(--amber)':'var(--red)',s:rr===null?'Sin pérdidas aún':rr>=2?'Excelente':rr>=1.5?'Muy bueno':rr>=1?'Positivo':'Mejorable',svg:svgs[2],ic:'#2d7dd2',ibg:'rgba(45,125,210,.1)'}];
  var byInst={};trs.forEach(function(t){if(!byInst[t.instrument])byInst[t.instrument]={pnl:0,count:0,wins:0};byInst[t.instrument].pnl+=t.pnlNet;byInst[t.instrument].count++;if(t.pnlNet>0)byInst[t.instrument].wins++;});

function renderDayOfWeek(trs){
  const days=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  const stats=days.map((_,i)=>({name:days[i],trades:[],wins:0,pnl:0}));
  trs.forEach(t=>{const d=new Date(t.date).getDay();stats[d].trades.push(t);if(t.pnlNet>0)stats[d].wins++;stats[d].pnl+=t.pnlNet;});
  const active=stats.filter(s=>s.trades.length>0);if(!active.length)return'<div style="text-align:center;color:var(--mid);font-size:11px;padding:20px">Sin datos</div>';
  const maxAbs=Math.max(...active.map(s=>Math.abs(s.pnl)),1);
  return active.map(s=>{const wr=s.trades.length?s.wins/s.trades.length*100:0;const col=s.pnl>=0?'var(--green)':'var(--red)';const barW=Math.round(Math.abs(s.pnl)/maxAbs*100);return'<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)"><div style="width:72px;font-size:11px;color:var(--text);flex-shrink:0">'+s.name+'</div><div style="flex:1"><div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden"><div style="height:100%;width:'+barW+'%;background:'+col+';border-radius:3px;transition:width .5s"></div></div></div><div style="width:60px;text-align:right;font-size:11px;font-weight:600;color:'+col+'">'+(s.pnl>=0?'+':'')+s.pnl.toFixed(0)+'</div><div style="width:38px;text-align:right;font-size:10px;color:var(--mid)">'+wr.toFixed(0)+'%</div><div style="width:24px;text-align:right;font-size:10px;color:var(--dim)">'+s.trades.length+'</div></div>';}).join('');
}
function drawStreak(trs){const cv=document.getElementById('streakCanvas');if(!cv)return;const dpr=window.devicePixelRatio||1,W=cv.offsetWidth,H=120;cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);const sorted=[...trs].sort((a,b)=>new Date(a.date)-new Date(b.date));if(!sorted.length)return;const streaks=[];let cur=0;sorted.forEach(t=>{if(t.pnlNet>0){cur=cur>=0?cur+1:1;}else{cur=cur<=0?cur-1:-1;}streaks.push(cur);});const pad={t:8,r:8,b:8,l:28};const cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;const maxV=Math.max(...streaks.map(Math.abs),1);const tx=i=>pad.l+(i/(streaks.length-1||1))*cW,ty=v=>pad.t+cH/2-((v)/maxV)*(cH/2);ctx.strokeStyle='rgba(0,0,0,.1)';ctx.lineWidth=1;ctx.setLineDash([3,4]);ctx.beginPath();ctx.moveTo(pad.l,pad.t+cH/2);ctx.lineTo(W-pad.r,pad.t+cH/2);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#94a3b8';ctx.font='8px DM Mono,monospace';ctx.textAlign='right';ctx.fillText('+'+maxV,pad.l-2,pad.t+4);ctx.fillText('-'+maxV,pad.l-2,pad.t+cH);const bw=Math.max(2,Math.min(8,(cW/streaks.length)-1));streaks.forEach((v,i)=>{const x=tx(i);const y0=ty(0);const y=ty(v);ctx.fillStyle=v>=0?'rgba(0,184,122,.7)':'rgba(230,48,80,.7)';ctx.fillRect(x-bw/2,Math.min(y,y0),bw,Math.abs(y-y0)||1);});}
function renderYearComparison(trs){const years=getTradeYears(trs);if(years.length<2)return'<div style="text-align:center;color:var(--mid);font-size:11px;padding:20px">Necesitas datos de al menos 2 años para comparar</div>';const months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];const byYear={};years.forEach(y=>{byYear[y]=Array(12).fill(0);});trs.forEach(t=>{const d=new Date(t.date);byYear[d.getFullYear()][d.getMonth()]+=t.pnlNet;});const colors=['var(--green)','var(--blue)','var(--amber)','var(--purple)'];const header='<div style="display:grid;grid-template-columns:50px repeat(12,1fr);gap:4px;margin-bottom:6px"><div></div>'+months.map(m=>'<div style="font-size:9px;color:var(--dim);text-align:center">'+m+'</div>').join('')+'</div>';const rows=years.map((y,yi)=>{const col=colors[yi%colors.length];const cells=byYear[y].map(v=>{const c=v>0?'var(--green)':v<0?'var(--red)':'var(--dim)';return'<div style="text-align:center;font-size:10px;font-weight:'+(v!==0?'600':'400')+';color:'+c+'">'+(v!==0?(v>0?'+':'')+v.toFixed(0):'—')+'</div>';}).join('');return'<div style="display:grid;grid-template-columns:50px repeat(12,1fr);gap:4px;padding:6px 0;border-top:1px solid var(--border)"><div style="font-size:11px;font-weight:600;color:'+col+'">'+y+'</div>'+cells+'</div>';}).join('');return header+rows;}
function calcStreak(trs){const s=[...trs].sort((a,b)=>new Date(b.date)-new Date(a.date));if(!s.length)return 0;const f=s[0].pnlNet>0;let n=0;for(const t of s){if((t.pnlNet>0)===f)n+=f?1:-1;else break;}return n;}
function getTradeYears(trs){const yrs=[...new Set(trs.map(t=>new Date(t.date).getFullYear()))].sort((a,b)=>b-a);return yrs.length?yrs:[new Date().getFullYear()];}
function renderYearSelector(trs){const years=getTradeYears(trs);const sel=filterYearMonths||years[0];if(!filterYearMonths)filterYearMonths=sel;return years.map(y=>'<button onclick="setFilterYear('+y+')" style="padding:4px 10px;border-radius:6px;font-size:10px;font-family:var(--font);border:1px solid '+(y===sel?'var(--green)':'var(--border2)')+';background:'+(y===sel?'var(--green-dim)':'none')+';color:'+(y===sel?'var(--green)':'var(--mid)')+';">'+y+'</button>').join('');}
function renderCalSelector(trs){const years=getTradeYears(trs);const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];const selY=filterYearCal||years[0];const selM=filterMonthCal!=null?filterMonthCal:new Date().getMonth();if(!filterYearCal)filterYearCal=selY;if(filterMonthCal===null)filterMonthCal=selM;const yearBtns=years.map(y=>'<button onclick="setFilterCalYear('+y+')" style="padding:4px 10px;border-radius:6px;font-size:10px;font-family:var(--font);border:1px solid '+(y===selY?'var(--blue)':'var(--border2)')+';background:'+(y===selY?'rgba(45,125,210,.1)':'none')+';color:'+(y===selY?'var(--blue)':'var(--mid)')+';">'+y+'</button>').join('');const monthBtns='<select onchange="setFilterCalMonth(this.value)" style="padding:4px 8px;border-radius:6px;font-size:10px;font-family:var(--font);border:1px solid var(--border2);background:var(--surface);color:var(--text);width:auto">'+MESES.map((m,i)=>'<option value="'+i+'"'+(selM===i?' selected':'')+'>'+m+'</option>').join('')+'</select>';return yearBtns+monthBtns;}
function setFilterYear(y){filterYearMonths=y;render();}function setFilterCalYear(y){filterYearCal=y;render();}function setFilterCalMonth(v){filterMonthCal=parseInt(v);render();}
function renderCalendar(trs){
  const DIAS_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const years=getTradeYears(trs);const selY=filterYearCal||years[0];const selM=filterMonthCal!=null?filterMonthCal:new Date().getMonth();
  const byDay={};trs.forEach(t=>{const d=new Date(t.date);if(d.getFullYear()!==selY||d.getMonth()!==selM)return;const key=d.getDate();if(!byDay[key])byDay[key]={pnl:0,count:0,wins:0};byDay[key].pnl+=t.pnlNet;byDay[key].count++;if(t.pnlNet>0)byDay[key].wins++;});
  const maxAbs=Math.max(...Object.values(byDay).map(d=>Math.abs(d.pnl)),1);const firstDow=new Date(selY,selM,1).getDay();const daysInMonth=new Date(selY,selM+1,0).getDate();
  const monthPnl=Object.values(byDay).reduce((s,d)=>s+d.pnl,0);const monthCount=Object.values(byDay).reduce((s,d)=>s+d.count,0);const monthWins=Object.values(byDay).reduce((s,d)=>s+d.wins,0);const monthCol=monthPnl>=0?'var(--green)':'var(--red)';
  let cells='';for(let i=0;i<firstDow;i++)cells+='<div></div>';
  for(let day=1;day<=daysInMonth;day++){const d=byDay[day];const dow=new Date(selY,selM,day).getDay();const isWeekend=dow===0||dow===6;if(d){const intensity=Math.min(Math.abs(d.pnl)/maxAbs,1);const bg=d.pnl>0?'rgba(0,184,122,'+(0.12+intensity*0.55)+')':d.pnl<0?'rgba(230,48,80,'+(0.12+intensity*0.55)+')':'var(--border)';const tc=d.pnl>0?'var(--green)':'var(--red)';const ps=(d.pnl>=0?'+':'-')+'$'+Math.abs(d.pnl).toFixed(0);cells+='<div style="background:'+bg+';border-radius:8px;padding:6px 4px;min-height:56px;display:flex;flex-direction:column;gap:2px" title="'+DIAS_FULL[selM]+' '+day+': '+ps+'"><span style="font-size:10px;color:var(--mid);font-weight:600">'+day+'</span><span style="font-size:9px;color:var(--dim)">'+d.count+(d.count===1?' trade':' trades')+'</span><span style="font-size:11px;font-weight:700;color:'+tc+';margin-top:auto">'+ps+'</span></div>';}else{const weekendBg=isWeekend?'rgba(0,0,0,0.02)':'var(--bg)';cells+='<div style="background:'+weekendBg+';border-radius:8px;padding:6px 4px;min-height:56px;border:1px dashed var(--border)"><span style="font-size:10px;color:'+(isWeekend?'var(--dim)':'var(--border2)')+'">'+day+'</span></div>';}}
  const monthSummary=monthCount>0?'<div style="display:flex;gap:16px;align-items:center;margin-bottom:10px;padding:10px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border)"><div style="font-family:-apple-system,sans-serif;font-size:22px;font-weight:700;color:'+monthCol+';">'+(monthPnl>=0?'+':'')+monthPnl.toFixed(0)+'</div><div style="flex:1"><div style="font-size:11px;color:var(--mid)">'+monthCount+' trades · '+monthWins+'W / '+(monthCount-monthWins)+'L · '+(monthCount?((monthWins/monthCount)*100).toFixed(0):0)+'% WR</div><div style="font-size:10px;color:var(--dim);margin-top:2px">'+DIAS_FULL[selM]+' '+selY+'</div></div></div>':'<div style="margin-bottom:10px;padding:10px 14px;background:var(--bg);border-radius:10px;border:1px solid var(--border);font-size:11px;color:var(--dim)">Sin trades en '+DIAS_FULL[selM]+' '+selY+'</div>';
  return monthSummary+'<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">'+['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'].map(l=>'<div style="text-align:center;font-size:9px;color:var(--dim);padding:3px 0;font-weight:600">'+l+'</div>').join('')+'</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">'+cells+'</div>';

function renderMonths(trs){const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];const byMonth={};trs.forEach(t=>{const d=new Date(t.date),key=d.getFullYear()+'-'+d.getMonth();if(!byMonth[key])byMonth[key]={pnl:0,count:0,wins:0,month:d.getMonth(),year:d.getFullYear()};byMonth[key].pnl+=t.pnlNet;byMonth[key].count++;if(t.pnlNet>0)byMonth[key].wins++;});const list=Object.values(byMonth).sort((a,b)=>a.year-b.year||a.month-b.month).slice(-6);if(!list.length)return'<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">Sin datos</div>';const mx=Math.max(...list.map(m=>Math.abs(m.pnl)),1);return list.map(m=>{const col=m.pnl>=0?'var(--green)':'var(--red)';const w=Math.abs(m.pnl)/mx*100;const ps=(m.pnl>=0?'+$':'-$')+Math.abs(m.pnl).toFixed(0);return'<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;color:var(--text)">'+MESES[m.month]+' '+m.year+'</span><div style="display:flex;gap:8px"><span style="font-size:9px;color:var(--mid)">'+m.count+' trades</span><span style="font-size:10px;font-weight:600;color:'+col+'">'+ps+'</span></div></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:'+w+'%;background:'+col+'"></div></div></div>';}).join('');}
function renderMonthsGrid(trs){const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];const years=getTradeYears(trs);const year=filterYearMonths||years[0];const byMonth={};trs.forEach(t=>{const d=new Date(t.date);if(d.getFullYear()!==year)return;const m=d.getMonth();if(!byMonth[m])byMonth[m]={pnl:0,count:0,wins:0};byMonth[m].pnl+=t.pnlNet;byMonth[m].count++;if(t.pnlNet>0)byMonth[m].wins++;});const maxAbs=Math.max(...Object.values(byMonth).map(m=>Math.abs(m.pnl)),1);return'<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">'+MESES.map((name,i)=>{const m=byMonth[i];const pnl=m?m.pnl:null;const bg=pnl===null?'var(--bg)':pnl>0?'rgba(0,184,122,'+(0.1+Math.abs(pnl)/maxAbs*0.5)+')':'rgba(230,48,80,'+(0.1+Math.abs(pnl)/maxAbs*0.5)+')';const intensity=pnl!==null?Math.abs(pnl)/maxAbs:0;const textCol=intensity>.5?'#fff':pnl===null?'var(--dim)':pnl>=0?'var(--green)':'var(--red)';const subTextCol=intensity>.5?'rgba(255,255,255,.8)':'var(--dim)';const ps=pnl===null?'—':(pnl>=0?'+$':'-$')+Math.abs(pnl).toFixed(0);const wr=m&&m.count?(m.wins/m.count*100).toFixed(0)+'% WR':'';return'<div style="background:'+bg+';border:1px solid var(--border);border-radius:10px;padding:12px 8px;text-align:center"><div style="font-size:10px;color:'+subTextCol+';margin-bottom:6px">'+name+'</div><div style="font-size:15px;font-weight:700;color:'+textCol+';line-height:1">'+ps+'</div><div style="font-size:9px;color:'+subTextCol+';margin-top:4px">'+(m?m.count+' trades':'')+'</div><div style="font-size:9px;color:'+textCol+';margin-top:2px;letter-spacing:.04em">'+wr+'</div></div>';}).join('')+'</div>';}
function renderBestWorstHours(trs){const byHour={};trs.forEach(t=>{const h=new Date(t.date).getHours();if(!byHour[h])byHour[h]={wins:0,losses:0,pnl:0,count:0};byHour[h].pnl+=t.pnlNet;byHour[h].count++;if(t.pnlNet>0)byHour[h].wins++;else byHour[h].losses++;});const entries=Object.entries(byHour);if(!entries.length)return'<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">Necesitas más trades</div>';const sortedDesc=[...entries].sort((a,b)=>(b[1].wins/b[1].count)-(a[1].wins/a[1].count)||(b[1].pnl-a[1].pnl));const best=sortedDesc.slice(0,Math.ceil(entries.length/2));const bestHours=new Set(best.map(([h])=>h));const worst=[...entries].sort((a,b)=>(a[1].wins/a[1].count)-(b[1].wins/b[1].count)||(a[1].pnl-b[1].pnl)).filter(([h])=>!bestHours.has(h)).slice(0,3);const row=(h,d,type)=>{const wr=(d.wins/d.count*100).toFixed(0);const col=type==='best'?'var(--green)':'var(--red)';const bg=type==='best'?'rgba(0,184,122,.1)':'rgba(230,48,80,.1)';return'<div class="hour-stat"><div class="hour-badge" style="background:'+bg+';color:'+col+'">'+h+'h</div><div style="flex:1"><div style="font-size:12px;font-weight:600;color:var(--text)">'+h+':00 — '+(parseInt(h)+1)+':00</div><div style="font-size:10px;color:var(--mid);margin-top:2px">'+d.count+' trades · '+wr+'% WR · '+fmt(d.pnl)+'</div></div><div style="font-size:14px;font-weight:700;color:'+col+'">'+wr+'%</div></div>';};return'<div style="margin-bottom:14px"><div style="font-size:10px;color:var(--green);font-weight:600;letter-spacing:.06em;margin-bottom:8px">✓ MEJOR HORARIO</div>'+best.map(([h,d])=>row(h,d,'best')).join('')+'</div><div><div style="font-size:10px;color:var(--red);font-weight:600;letter-spacing:.06em;margin-bottom:8px">✗ PEOR HORARIO</div>'+worst.map(([h,d])=>row(h,d,'worst')).join('')+'</div>';}
function renderSetups(trs){const bs={};trs.forEach(t=>{const s=t.setup||'—';if(!bs[s])bs[s]={pnl:0,count:0,wins:0};bs[s].pnl+=t.pnlNet;bs[s].count++;if(t.pnlNet>0)bs[s].wins++;});const list=Object.entries(bs).filter(([k])=>k!=='—').sort((a,b)=>b[1].pnl-a[1].pnl).slice(0,6);if(!list.length)return'<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">Agrega setups a tus trades</div>';const mx=Math.max(...list.map(([,v])=>Math.abs(v.pnl)),1);return list.map(([name,d])=>{const wr=d.count?d.wins/d.count*100:0,w=Math.abs(d.pnl)/mx*100,col=d.pnl>=0?'var(--green)':'var(--red)';return'<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:3px"><span style="font-size:10px;color:var(--text)">'+name+'</span><div style="display:flex;gap:8px"><span style="font-size:9px;color:var(--mid)">'+wr.toFixed(0)+'%WR</span><span style="font-size:10px;font-weight:500;color:'+col+'">'+fmt(d.pnl)+'</span></div></div><div class="stat-bar-bg"><div class="stat-bar-fill" style="width:'+w+'%;background:'+col+'"></div></div></div>';}).join('');}
function renderByInstrument(trs){
  var byInst={};trs.forEach(function(t){if(!byInst[t.instrument])byInst[t.instrument]={pnl:0,count:0,wins:0};
  byInst[t.instrument].pnl+=t.pnlNet;byInst[t.instrument].count++;if(t.pnlNet>0)byInst[t.instrument].wins++;});

  if(!list.length)return'<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">Sin datos</div>';

    +list.map(function(e){

      var wr=d.count?d.wins/d.count*100:0;
      var col=d.pnl>=0?'var(--green)':'var(--red)';
      var intensity=Math.abs(d.pnl)/maxAbs;
      var bg=d.pnl>=0?'rgba(0,184,122,'+(0.07+intensity*0.2)+')':'rgba(230,48,80,'+(0.07+intensity*0.2)+')';
      return'<div style="background:'+bg+';border:1px solid var(--border);border-radius:10px;padding:12px">'
        +'<div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:4px">'+inst+'</div>'

        +'<div style="font-size:10px;color:var(--mid);margin-top:3px">'+d.count+' trades · '+wr.toFixed(0)+'% WR</div></div>';
    }).join('')+'</div>';
}
function renderCRTStats(trs){const stats={};trs.forEach(t=>{const m=(t.note||'').match(/\[CRT:([^\]]+)\]/);if(!m)return;m[1].split(',').forEach(r=>{if(!stats[r])stats[r]={tp:0,sl:0};if(t.pnlNet>0)stats[r].tp++;else stats[r].sl++;});});const list=Object.entries(stats).sort((a,b)=>(b[1].tp/(b[1].tp+b[1].sl||1))-(a[1].tp/(a[1].tp+a[1].sl||1))).slice(0,6);if(!list.length)return'<div style="color:var(--dim);font-size:11px;text-align:center;padding:20px">Marca rangos CRT al ingresar trades para ver estadísticas</div>';return list.map(([name,d])=>{const total=d.tp+d.sl,wr=total?d.tp/total*100:0,col=wr>=50?'var(--green)':'var(--red)';return'<div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)"><div><div style="font-size:11px;font-weight:600;color:var(--text)">'+name+'</div><div style="font-size:10px;color:var(--mid);margin-top:2px">'+d.tp+'TP · '+d.sl+'SL · '+total+' trades</div></div><div style="font-size:16px;font-weight:700;color:'+col+'">'+wr.toFixed(0)+'%</div></div>';}).join('');}

      +imgs
      +'<td onclick="event.stopPropagation()">'

    +'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
}

function calcResult(inst,entry,exit,qty,dir){
  if(!entry||!exit)return null;
  // FX Futures (6E, 6B, etc.)
  if(isFxFuture(inst)){
    const spec=FX_FUTURES_SPECS[inst];
    const pips=(dir==='Long'?exit-entry:entry-exit)/spec.pip;
    const gross=pips*spec.pipVal*qty;
    return{pips,gross,unit:'pip'};
  }
  // Forex/CFD
  if(isFx(inst)){
    const pip=pipSz(inst),pips=(dir==='Long'?exit-entry:entry-exit)/pip;
    return{pips,gross:pips*10*qty,unit:'pip'};
  }
  // Futures USA
  const spec=FUTURES_SPECS[inst]||{tick:.25,tv:1.25};
  const ticks=(dir==='Long'?exit-entry:entry-exit)/spec.tick;
  return{ticks,gross:ticks*spec.tv*qty,unit:'tick'};
}

function drawMAE(trs){const cv=document.getElementById('maeCanvas');if(!cv)return;const dpr=window.devicePixelRatio||1,W=cv.offsetWidth,H=160;cv.width=W*dpr;cv.height=H*dpr;const ctx=cv.getContext('2d');ctx.scale(dpr,dpr);const pad={t:8,r:8,b:16,l:26},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b;const maxMFE=Math.max(...trs.map(t=>t.mfe||0),1),maxMAE=Math.max(...trs.map(t=>t.mae||0),1);for(let i=0;i<=3;i++){ctx.strokeStyle='#e2e8f0';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,pad.t+cH/3*i);ctx.lineTo(W-pad.r,pad.t+cH/3*i);ctx.stroke();}trs.forEach(t=>{const x=pad.l+((t.mfe||0)/maxMFE)*cW,y=pad.t+cH-((t.mae||0)/maxMAE)*cH;ctx.beginPath();ctx.arc(x,y,3,0,Math.PI*2);ctx.fillStyle=t.pnlNet>0?'rgba(0,184,122,.6)':'rgba(230,48,80,.55)';ctx.fill();});ctx.fillStyle='#94a3b8';ctx.font='8px DM Mono,monospace';ctx.textAlign='center';ctx.fillText('MFE →',pad.l+cW/2,H-2);ctx.save();ctx.translate(9,pad.t+cH/2);ctx.rotate(-Math.PI/2);ctx.fillText('MAE →',0,0);ctx.restore();}

function attachEvents(){
  setTimeout(()=>{drawCharts();if(editingTrade){currentDir=editingTrade.direction;currentRating=editingTrade.rating||3;}else{currentDir='Long';currentRating=3;}if(document.getElementById('f-entry'))updatePnL();if(!editingTrade)formCRTStates={};if(editingTrade){const m=(editingTrade.note||'').match(/\[CRT:([^\]]+)\]/);if(m){m[1].split(',').forEach(r=>{const[tf,state]=r.split(':');if(!tf||!state)return;formCRTStates[tf]=state;const el=document.getElementById('crt-form-'+tf),stEl=document.getElementById('crt-form-state-'+tf);if(el&&stEl){const col=state==='activo'?'var(--green)':state==='vivo'?'var(--amber)':'var(--purple)';el.style.borderColor=col;stEl.textContent=state.charAt(0).toUpperCase()+state.slice(1);stEl.style.color=col;}});}}},50);
}

// ─── CRT SETUPS ────────────────────────────────────────────────
let crtSetupsMinTrades=5;
function setCRTMinTrades(v){crtSetupsMinTrades=parseInt(v);render();}
function renderCRTSetups(){
  const trs=currentTrades();
  if(!trs.length)return'<div class="empty"><div style="margin-bottom:10px">'+modeLabel()+'</div><div class="empty-icon">📊</div><div class="empty-title">Sin trades</div><div class="empty-sub">Agrega trades con CRT y setup para ver el análisis</div></div>';
  const combos=[];trs.forEach(t=>{const m=(t.note||'').match(/\[CRT:([^\]]+)\]/);if(!m)return;const crts=m[1].split(',').map(r=>r.trim()).filter(Boolean);if(!crts.length)return;combos.push({crts,setup:t.setup||'—',pnlNet:t.pnlNet,pnlGross:t.pnlGross||0,win:t.pnlNet>0});});
  if(!combos.length)return'<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Sin datos CRT</div><div class="empty-sub">Marca rangos CRT al ingresar tus trades para ver el análisis</div></div>';
  const conditionMap={};function getSubsets(arr){const result=[];for(let mask=1;mask<(1<<arr.length);mask++){const sub=arr.filter((_,i)=>mask&(1<<i));result.push(sub);}return result;}
  combos.forEach(({crts,setup,pnlNet,pnlGross,win})=>{const subsets=getSubsets(crts);subsets.forEach(subset=>{const setupLabel=setup&&setup!=='—'?setup:'Sin setup';const keyWithSetup=subset.sort().join(' + ')+' | '+setupLabel;if(!conditionMap[keyWithSetup])conditionMap[keyWithSetup]={label:subset.sort().join(' + '),setup:setupLabel,trades:[],wins:0,pnl:0,grossW:0,grossL:0};conditionMap[keyWithSetup].trades.push(pnlNet);if(win){conditionMap[keyWithSetup].wins++;conditionMap[keyWithSetup].grossW+=pnlGross;}else conditionMap[keyWithSetup].grossL+=Math.abs(pnlGross);conditionMap[keyWithSetup].pnl+=pnlNet;});});
  const results=Object.values(conditionMap).filter(c=>c.trades.length>=crtSetupsMinTrades).map(c=>{const n=c.trades.length,wr=c.wins/n*100;const avgW=c.wins?c.grossW/c.wins:0;const losses=n-c.wins;const avgL=losses?c.grossL/losses:0;const exp=(wr/100*avgW)-((1-wr/100)*avgL);const pf=c.grossL>0?c.grossW/c.grossL:null;return{...c,n,wr,avgW,avgL,exp,pf};}).sort((a,b)=>b.exp-a.exp);
  const minOpts=[3,5,10,15,20];
  return'<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">'+modeLabel()+'</div><div class="card"><div class="card-head"><div><div class="card-title">Análisis automático de confluencias</div><div class="card-subtitle">Todas las combinaciones CRT + Setup ordenadas por expectativa</div></div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:10px;color:var(--mid)">Mín. trades:</span>'+minOpts.map(n=>'<button onclick="setCRTMinTrades('+n+')" style="padding:4px 10px;border-radius:6px;font-size:10px;font-family:var(--font);border:1px solid '+(crtSetupsMinTrades===n?'var(--green)':'var(--border2)')+';background:'+(crtSetupsMinTrades===n?'var(--green-dim)':'none')+';color:'+(crtSetupsMinTrades===n?'var(--green)':'var(--mid)')+';">'+n+'</button>').join('')+'</div></div><div class="tbl-wrap">'+(results.length===0?'<div style="padding:40px;text-align:center;color:var(--mid);font-size:11px">No hay combinaciones con '+crtSetupsMinTrades+'+ trades. Baja el mínimo o agrega más trades.</div>':'<table><thead><tr><th>CONFLUENCIA CRT</th><th>SETUP</th><th>TRADES</th><th>WIN RATE</th><th>EXPECTATIVA</th><th>AVG WIN</th><th>AVG LOSS</th><th>PROFIT FACTOR</th></tr></thead><tbody>'+results.map((r,i)=>{const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';const wrCol=r.wr>=60?'var(--green)':r.wr>=50?'var(--amber)':'var(--red)';const expCol=r.exp>=0?'var(--green)':'var(--red)';const pfCol=r.pf&&r.pf>=1.5?'var(--green)':r.pf&&r.pf>=1?'var(--amber)':'var(--red)';return'<tr><td style="font-weight:600;color:var(--text)">'+medal+' '+r.label+'</td><td style="color:var(--mid);font-size:10px">'+r.setup+'</td><td style="color:var(--dim)">'+r.n+'</td><td style="color:'+wrCol+';font-weight:600">'+r.wr.toFixed(1)+'%</td><td style="color:'+expCol+';font-weight:700">'+fmt(r.exp)+'</td><td style="color:var(--green)">'+fmt(r.avgW)+'</td><td style="color:var(--red)">-$'+r.avgL.toFixed(0)+'</td><td style="color:'+pfCol+'">'+(r.pf!==null?r.pf.toFixed(2):'—')+'</td></tr>';}).join('')+'</tbody></table>')+'</div></div>';
}

// ─── DEMO ──────────────────────────────────────────────────────
async function loadDemo(){if(!confirm('¿Cargar ~30 trades de ejemplo en modo '+currentMode+'?'))return;const demo=genDemo(30);try{for(const t of demo){const[s]=await insertTrade(t);trades=[fromDb(s),...trades];}setSync(true,trades.length+' trades');showToast('Demo cargado ✓');render();}catch(e){alert('Error: '+e.message);}}
async function deleteDemo(){const demoTrades=trades.filter(t=>t.source==='demo'&&t.mode===currentMode);if(!demoTrades.length){showToast('No hay trades demo en este modo');return;}if(!confirm('¿Eliminar los '+demoTrades.length+' trades de demo en modo '+currentMode+'?'))return;try{for(const t of demoTrades)await deleteTrade(t.id);trades=trades.filter(t=>!(t.source==='demo'&&t.mode===currentMode));setSync(true,trades.length+' trades');showToast(demoTrades.length+' trades demo eliminados ✓');render();}catch(e){alert('Error: '+e.message);}}
function genDemo(n){
  const result=[],insts=['MES','MNQ','6E','6B','EURUSD'];let date=new Date('2025-10-01T09:30:00');
  for(let i=0;i<n;i++){
    while([0,6].includes(date.getDay()))date=new Date(date.getTime()+86400000);
    const inst=insts[Math.floor(Math.random()*insts.length)];
    const fx=isFx(inst),fxFut=isFxFuture(inst);
    const qty=fx&&!fxFut?+(Math.random()>.5?.10:.05).toFixed(2):1;
    let gross,comm;
    if(fxFut){const spec=FX_FUTURES_SPECS[inst];const pips=Math.random()>.43?Math.floor(Math.random()*30+5):-Math.floor(Math.random()*20+3);gross=pips*spec.pipVal*qty;comm=qty*2*5;}
    else if(fx){const pips=Math.random()>.43?Math.floor(Math.random()*30+5):-Math.floor(Math.random()*20+3);gross=pips*10*qty;comm=7;}
    else{const spec=FUTURES_SPECS[inst]||{tick:.25,tv:1.25};const ticks=Math.random()>.43?Math.floor(Math.random()*28+4):-Math.floor(Math.random()*18+3);gross=ticks*spec.tv*qty;comm=qty*2*.62;}
    result.push({date:date.toISOString(),instrument:inst,direction:Math.random()>.45?'Long':'Short',qty,entryPrice:+(5200+Math.random()*50).toFixed(2),exitPrice:+(5200+Math.random()*50).toFixed(2),pnlGross:+gross.toFixed(2),pnlNet:+(gross-comm).toFixed(2),commission:+comm.toFixed(2),durationMin:Math.floor(Math.random()*30+1),mae:Math.floor(Math.random()*14),mfe:Math.floor(Math.random()*35+4),setup:SETUPS[Math.floor(Math.random()*SETUPS.length)],emotion:EMOTIONS[Math.floor(Math.random()*EMOTIONS.length)],note:'',rating:Math.floor(Math.random()*5)+1,source:'demo',imagePath:null,mode:currentMode});
    date=new Date(date.getTime()+Math.random()*5400000+900000);if(date.getHours()>=16){date=new Date(date.getTime()+18*3600000);date.setHours(9,30,0,0);}
  }return result;
}


var modalTradeIndex=-1;

function openTradeModal(id){
  var trs=currentTrades();
  var idx=-1;
  for(var i=0;i<trs.length;i++){if(trs[i].id==id){idx=i;break;}}
  if(idx===-1)return;
  modalTradeIndex=idx;
  renderTradeModal(trs);
  document.getElementById('tradeModal').style.display='flex';
  document.body.style.overflow='hidden';
}

function closeTradeModal(){
  document.getElementById('tradeModal').style.display='none';
  document.body.style.overflow='';
}

function modalNav(dir){
  var trs=currentTrades();
  var ni=modalTradeIndex+dir;
  if(ni<0||ni>=trs.length)return;
  modalTradeIndex=ni;
  renderTradeModal(trs);
}

function renderTradeModal(trs){
  var t=trs[modalTradeIndex];
  if(!t)return;
  var panel=document.getElementById('tradeModalPanel');
  var isLong=t.direction==='Long';
  var pnlCol=t.pnlNet>=0?'var(--green)':'var(--red)';
  var d=new Date(t.date);
  var days=['Dom','Lun','Mar','Mie','Jue','Vie','Sab'];
  var months=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  var dt=days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear()+' \xB7 '+d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
  var imgUrl =t.imagePath ?getImagePublicUrl(t.imagePath) :null;
  var imgUrl2=t.imagePath2?getImagePublicUrl(t.imagePath2):null;

  // Images block
  var imgsHtml='';
  if(!imgUrl&&!imgUrl2){
    imgsHtml='<div class="tm-no-img"><span style="font-size:28px;opacity:.2">&#128247;</span><span>Sin screenshots</span></div>';
  } else {
    var cls=(imgUrl&&imgUrl2)?'tm-imgs':'tm-imgs single';
    imgsHtml='<div class="'+cls+'">';
    if(imgUrl) imgsHtml+='<div class="tm-img-wrap" onclick="openLightbox(\''+imgUrl+'\',\'Inicio\')"><img src="'+imgUrl+'" alt="inicio"><span class="tm-img-label start">INICIO</span></div>';
    if(imgUrl2) imgsHtml+='<div class="tm-img-wrap" onclick="openLightbox(\''+imgUrl2+'\',\'Fin\')"><img src="'+imgUrl2+'" alt="fin"><span class="tm-img-label end">FIN</span></div>';
    imgsHtml+='</div>';
  }

  // CRT
  var crtM=(t.note||'').match(/\[CRT:([^\]]+)\]/);
  var crtBadges='<span style="color:var(--dim);font-size:11px">Sin rangos</span>';
  if(crtM){
    crtBadges=crtM[1].split(',').map(function(r){
      var p=r.split(':');if(!p[0]||!p[1])return'';
      var col=p[1]==='activo'?'var(--green)':p[1]==='vivo'?'var(--amber)':'var(--purple)';
      return'<span style="padding:3px 10px;border-radius:20px;border:1px solid '+col+';color:'+col+';font-size:10px">'+p[0]+' '+p[1]+'</span>';
    }).join('');
  }

  // Note
  var note=(t.note||'').replace(/\[CRT:[^\]]+\]/g,'').trim();

  // Stars
  var rating=t.rating||0;
  var stars='<div class="tm-stars">';
  for(var si=1;si<=5;si++) stars+='<span style="font-size:17px;color:'+(si<=rating?'var(--amber)':'var(--border2)')+'">&#9733;</span>';
  stars+='</div>';

  // MAE MFE
  var maeMax=Math.max(t.mae||0,t.mfe||0,1);
  var maePct=Math.round((t.mae||0)/maeMax*100);
  var mfePct=Math.round((t.mfe||0)/maeMax*100);

  // Key level
  var kl='\u2014';
  if(t.keyLevel&&t.keyLevel!=='\u2014'&&t.keyLevel!=='&mdash;'){
    kl='<span style="background:rgba(45,125,210,.1);border:1px solid var(--blue);color:var(--blue);padding:2px 8px;border-radius:4px;font-size:10px">'+t.keyLevel+(t.keyLevelNote?' \u2014 '+t.keyLevelNote:'')+'</span>';
  }

  // Emotion icons
  var emoMap={'Tranquilo':'\uD83D\uDE0C','Ansioso':'\uD83D\uDE30','Impaciente':'\uD83D\uDE24','Confiado':'\uD83D\uDE0E','Revenge':'\uD83D\uDE21','FOMO':'\uD83E\uDD11'};
  var emo=t.emotion||'\u2014';
  var emoStr=(emoMap[emo]?emoMap[emo]+' ':'')+emo;

  // Duration
  var dur=t.durationMin>=60?Math.floor(t.durationMin/60)+'h '+(t.durationMin%60)+'m':(t.durationMin||0)+'m';

  var html='<div class="tm-header">'
    +'<div class="tm-inst">'+t.instrument+'</div>'
    +'<div class="tm-dir '+(isLong?'long':'short')+'">'+(isLong?'LONG':'SHORT')+'</div>'
    +'<div class="tm-date">'+dt+'</div>'
    +modeLabel()
    +'<div class="tm-actions">'
    +'<button class="tm-nav-btn" onclick="modalNav(-1)" '+(modalTradeIndex===0?'disabled':'')+'>&#x2190;</button>'
    +'<span style="font-size:10px;color:var(--dim);min-width:36px;text-align:center">'+(modalTradeIndex+1)+'/'+trs.length+'</span>'
    +'<button class="tm-nav-btn" onclick="modalNav(1)" '+(modalTradeIndex===trs.length-1?'disabled':'')+'>&#x2192;</button>'
    +'<button onclick="closeTradeModal();editTrade(\''+t.id+'\')" style="background:none;border:1px solid var(--border2);color:var(--mid);padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer">&#x270F;&#xFE0F; Editar</button>'
    +'<button onclick="closeTradeModal();confirmDelete(\''+t.id+'\')" style="background:none;border:1px solid var(--border2);color:var(--red);padding:5px 10px;border-radius:8px;font-size:11px;cursor:pointer">&#x1F5D1;</button>'
    +'<button class="tm-close" onclick="closeTradeModal()">&#x2715;</button>'
    +'</div></div>'
    +'<div class="tm-body">'
    +'<div class="tm-left">'
    +imgsHtml
    +'<div class="tm-section"><div class="tm-stitle">Rangos CRT</div><div style="display:flex;flex-wrap:wrap;gap:5px">'+crtBadges+'</div></div>'
    +'<div class="tm-section"><div class="tm-stitle">Nota</div><div class="tm-note">'+(note||'<span style="color:var(--dim);font-style:italic">Sin nota</span>')+'</div></div>'
    +'</div>'
    +'<div class="tm-right">'
    +'<div class="tm-pnl-hero">'
    +'<div class="tm-pnl-val" style="color:'+pnlCol+'">'+(t.pnlNet>=0?'+':'')+'\u0024'+Math.abs(t.pnlNet).toFixed(2)+'</div>'
    +'<div class="tm-pnl-sub">Bruto '+(t.pnlGross>=0?'+':'')+'\u0024'+Math.abs(t.pnlGross||0).toFixed(2)+' \xB7 Comisi\xF3n -\u0024'+(t.commission||0).toFixed(2)+'</div>'
    +stars+'</div>'
    +'<div class="tm-stat-grid">'
    +'<div class="tm-stat"><div class="tm-stat-label">Entry</div><div class="tm-stat-val">'+t.entryPrice+'</div></div>'
    +'<div class="tm-stat"><div class="tm-stat-label">Exit</div><div class="tm-stat-val">'+t.exitPrice+'</div></div>'
    +'<div class="tm-stat"><div class="tm-stat-label">Cantidad</div><div class="tm-stat-val">'+t.qty+'</div></div>'
    +'<div class="tm-stat"><div class="tm-stat-label">Duraci\xF3n</div><div class="tm-stat-val">'+dur+'</div></div>'
    +'</div>'
    +'<div class="tm-section"><div class="tm-stitle">MAE / MFE</div>'
    +'<div style="display:grid;gap:6px">'
    +'<div><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span style="color:var(--red)">MAE</span><span style="font-weight:600">'+(t.mae||0)+'</span></div><div class="tm-progress"><div class="tm-progress-fill" style="width:'+maePct+'%;background:var(--red)"></div></div></div>'
    +'<div><div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:2px"><span style="color:var(--green)">MFE</span><span style="font-weight:600">'+(t.mfe||0)+'</span></div><div class="tm-progress"><div class="tm-progress-fill" style="width:'+mfePct+'%;background:var(--green)"></div></div></div>'
    +'</div></div>'
    +'<div class="tm-section"><div class="tm-stitle">Contexto</div>'
    +'<div class="tm-ctx-row"><span style="color:var(--mid)">Setup</span><span style="font-weight:600">'+(t.setup||'\u2014')+'</span></div>'
    +'<div class="tm-ctx-row"><span style="color:var(--mid)">Key Level</span><span>'+kl+'</span></div>'
    +'<div class="tm-ctx-row"><span style="color:var(--mid)">Emoci\xF3n</span><span style="font-weight:600">'+emoStr+'</span></div>'
    +'<div class="tm-ctx-row"><span style="color:var(--mid)">Modo</span><span>'+modeLabel()+'</span></div>'
    +'</div></div></div>';
  panel.innerHTML=html;
}

document.addEventListener('keydown',function(e){
  var modal=document.getElementById('tradeModal');
  if(!modal||modal.style.display!=='flex')return;
  if(e.key==='Escape')closeTradeModal();
  if(e.key==='ArrowLeft')modalNav(-1);
  if(e.key==='ArrowRight')modalNav(1);
});

function fmt(v){return(v>=0?'+':'')+('$'+Math.abs(v).toFixed(0));}
function toggleTheme(){const d=document.body.classList.toggle('dark');localStorage.setItem('tradelog-theme',d?'dark':'light');const icon=d?'☀️':'🌙';['themeBtn','themeBtnM'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent=icon;});setTimeout(()=>drawCharts(),50);}
function initTheme(){const saved=localStorage.getItem('tradelog-theme');if(saved==='dark'){document.body.classList.add('dark');['themeBtn','themeBtnM'].forEach(id=>{const el=document.getElementById(id);if(el)el.textContent='☀️';});}}
initTheme();window.addEventListener('resize',()=>drawCharts());init();

</script>
